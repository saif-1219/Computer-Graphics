<!DOCTYPE html>
<html>
    <head>
        <title>Platonic Solids & Duals</title>
        <style>
            body { margin: 0; overflow: hidden; background-color: #333; color: white; font-family: sans-serif; }
            #controls { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
            canvas { display: block; }
        </style>
        <script src="mat4.js"></script>
        <script src="solids.js" defer></script>
    </head>
    <body>
        <div id="controls">
            <h3>Controls</h3>
            <p><b>1-5:</b> Switch Solid</p>
            <p><b>D:</b> Toggle Dual</p>
            <p><b>W:</b> Toggle Wireframe</p>
            <input type="range" id="scaleSlider" min="0.1" max="5" step="0.1" value="1.5"> Scale
        </div>
        <canvas id="c"></canvas>
    </body>
</html>
